# docker-compose.yml
version: '3.8'

services:
  # 1. 外場服務生 (FastAPI)
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      # 將共享的資料夾掛載進容器，確保資料庫是同一個
      - shared-data:/app/data

  # 2. 內場廚房 (Celery Worker)
  worker:
    build: .
    command: celery -A core.celery_app worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      # Worker 也掛載同一個資料夾
      - shared-data:/app/data

  # 3. 佈告欄 (Redis)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

# 宣告一個全局的共用儲存空間
volumes:
  shared-data: