# docker-compose.yml
version: '3.8'

services:
  # 1. 外場服務生 (FastAPI)
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env

  # 2. 內場廚房 (Celery Worker)
  worker:
    build: .
    command: celery -A core.celery_app worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env

  # 3. 佈告欄 (Redis)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"